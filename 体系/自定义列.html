<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证申请列表 - 自定义列表项配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', "Microsoft YaHei", "SimHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .field-item {
            transition: all 0.2s ease;
        }
        
        .field-item.dragging {
            opacity: 0.5;
            background-color: #f3f4f6;
            transform: scale(0.98);
        }
        
        .field-item:hover {
            background-color: #f9fafb;
        }
        
        .drag-handle {
            cursor: grab;
        }
        
        .drag-handle:active {
            cursor: grabbing;
        }
        
        .checkbox-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        
        .checkbox-wrapper input[type="checkbox"]:disabled + div {
            background-color: #e5e7eb;
            border-color: #d1d5db;
            cursor: not-allowed;
        }
        
        .checkbox-wrapper input[type="checkbox"]:disabled:checked + div {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="p-4">

    <!-- 直接展示的弹窗 - 固定宽高 640x560px，无背景遮罩 -->
    <div class="w-[640px] h-[560px] bg-white rounded-lg shadow-2xl border border-gray-200 flex flex-col overflow-hidden relative z-50">
        
        <!-- 头部 -->
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r to-white">
            <div>
                <h3 class="text-lg font-semibold text-gray-800">自定义列表项</h3>
                <p class="text-xs text-gray-500 mt-0.5">拖拽调整字段顺序，勾选控制显示/隐藏</p>
            </div>
            <button class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-full hover:bg-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- 提示信息 -->
        <div class="mx-6 mt-4 p-3 bg-amber-50 border border-amber-200 rounded-md flex items-start gap-2">
            <svg class="w-4 h-4 text-amber-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <div class="text-xs text-amber-800 leading-relaxed">
                <span class="font-semibold">关键字段不可取消勾选：</span>认证申请编号、客户名称、申请状态、操作为系统关键字段，必须显示在列表中。
            </div>
        </div>

        <!-- 列表头部 -->
        <div class="px-6 py-2 mt-2 grid grid-cols-[40px_1fr_80px] text-xs font-medium text-gray-500 border-b border-gray-100">
            <span>排序</span>
            <span>字段名称</span>
            <span class="text-center">显示</span>
        </div>

        <!-- 可滚动列表区域 -->
        <div class="flex-1 overflow-y-auto custom-scroll px-6 py-2" id="fieldList">
            <!-- 列表项将通过JS动态生成 -->
        </div>

        <!-- 底部按钮 -->
        <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center">
            <button onclick="resetFields()" class="text-sm text-gray-600 hover:text-gray-800 font-medium px-3 py-1.5 rounded hover:bg-gray-200 transition-colors">
                恢复默认
            </button>
            <div class="flex gap-3">
                <button class="px-4 py-2 text-sm text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 font-medium transition-colors shadow-sm">
                    取消
                </button>
                <button onclick="saveConfig()" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-md hover:bg-blue-700 font-medium transition-colors shadow-sm flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    确定
                </button>
            </div>
        </div>
    </div>

    <script>
        // 字段配置数据 - 基于文档 3.1.1 认证申请列表
        const defaultFields = [
            { id: 'applyNo', label: '认证申请编号', key: true, checked: true },
            { id: 'customerName', label: '客户名称', key: true, checked: true },
            { id: 'cqcOrg', label: 'CQC受理机构', key: false, checked: true },
            { id: 'applicant', label: '申请人', key: false, checked: false },
            { id: 'auditType', label: '审核类型', key: false, checked: true },
            { id: 'certField', label: '认证领域-认证标准', key: false, checked: true },
            { id: 'contact', label: '联系人', key: false, checked: false },
            { id: 'phone', label: '联系电话', key: false, checked: false },
            { id: 'applyDate', label: '申请日期', key: false, checked: true },
            { id: 'status', label: '申请状态', key: true, checked: true },
            { id: 'operation', label: '操作', key: true, checked: true }
        ];

        let fields = JSON.parse(JSON.stringify(defaultFields));
        let draggedItem = null;

        function renderFields() {
            const container = document.getElementById('fieldList');
            container.innerHTML = '';

            fields.forEach((field, index) => {
                const item = document.createElement('div');
                item.className = `field-item grid grid-cols-[40px_1fr_80px] items-center py-3 border-b border-gray-50 last:border-0 ${field.key ? 'bg-blue-50/30' : ''}`;
                item.draggable = true;
                item.dataset.index = index;

                // 拖拽手柄
                const handle = document.createElement('div');
                handle.className = 'drag-handle text-gray-400 hover:text-gray-600 flex items-center justify-center w-8 h-8 rounded hover:bg-gray-100';
                handle.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
                    </svg>
                `;

                // 字段名称
                const label = document.createElement('div');
                label.className = 'flex items-center gap-2';
                label.innerHTML = `
                    <span class="text-sm font-medium ${field.key ? 'text-gray-900' : 'text-gray-700'}">${field.label}</span>
                    ${field.key ? '<span class="px-1.5 py-0.5 text-[10px] bg-blue-100 text-blue-700 rounded border border-blue-200 font-semibold">关键</span>' : ''}
                `;

                // 复选框
                const checkboxWrapper = document.createElement('div');
                checkboxWrapper.className = 'flex justify-center';
                checkboxWrapper.innerHTML = `
                    <label class="checkbox-wrapper cursor-pointer relative">
                        <input type="checkbox" 
                               class="peer sr-only" 
                               ${field.checked ? 'checked' : ''} 
                               ${field.key ? 'disabled' : ''}
                               onchange="toggleField(${index})">
                        <div class="w-5 h-5 border-2 border-gray-300 rounded transition-all peer-checked:bg-blue-600 peer-checked:border-blue-600 peer-disabled:opacity-60 peer-disabled:cursor-not-allowed flex items-center justify-center">
                            ${field.checked ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
                        </div>
                    </label>
                `;

                item.appendChild(handle);
                item.appendChild(label);
                item.appendChild(checkboxWrapper);

                // 拖拽事件
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);

                container.appendChild(item);
            });
        }

        function toggleField(index) {
            if (!fields[index].key) {
                fields[index].checked = !fields[index].checked;
                renderFields();
            }
        }

        function handleDragStart(e) {
            draggedItem = parseInt(e.target.dataset.index);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDrop(e) {
            e.preventDefault();
            const droppedItem = parseInt(e.target.closest('.field-item').dataset.index);
            
            if (draggedItem !== droppedItem) {
                // 交换位置
                const itemToMove = fields[draggedItem];
                fields.splice(draggedItem, 1);
                fields.splice(droppedItem, 0, itemToMove);
                
                // 确保关键字段始终在前4个位置（业务逻辑可选）
                // 这里允许任意排序以提供灵活性
                renderFields();
            }
        }

        function resetFields() {
            fields = JSON.parse(JSON.stringify(defaultFields));
            renderFields();
        }

        function saveConfig() {
            const checkedFields = fields.filter(f => f.checked);
            const config = {
                fields: fields,
                checkedCount: checkedFields.length,
                timestamp: new Date().toISOString()
            };
            
            console.log('保存配置：', config);
            
            // 视觉反馈
            const btn = document.querySelector('button[onclick="saveConfig()"]');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 保存中...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> 已保存';
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.add('bg-green-600', 'hover:bg-green-700');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                    btn.classList.remove('bg-green-600', 'hover:bg-green-700');
                }, 1500);
            }, 600);
        }

        // 初始化渲染
        renderFields();
    </script>
</body>
</html>
