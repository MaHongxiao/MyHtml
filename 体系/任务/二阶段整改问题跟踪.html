        .badge-error {

            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #d9d9d9;

            position: relative;

        .step-item.pending .step-circle {

            color: #1890ff;
            background: #fff;
        }
        
        .step-item.active .step-circle {
            background: #1890ff;
            border-color: #1890ff;
            color: white;
        }
        
        .step-item.completed .step-circle {
            background: #52c41a;
            border-color: #52c41a;
            color: white;
        }
        
        .step-line {

            left: 50%;
            right: -50%;
            height: 2px;
            background: #e8e8e8;
            z-index: 1;
        }
        
        .step-item.completed .step-line {
            background: #52c41a;
        }

        .step-item:last-child .step-line {

        }
        
        .step-title {

            font-size: 14px;
            color: #595959;
            font-weight: 500;

        .step-item.active .step-title,

            color: #1890ff;
            font-weight: 600;
        }
        
        .step-item.completed .step-title {
            color: #52c41a;
        }
        
        .step-date {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 4px;

            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
            display: flex;
            align-items: center;

        .ncr-section-content {

            background: #f5f5f5;
            border-radius: 4px;
            font-size: 13px;
            color: #595959;
            min-height: 60px;

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;

            background: #d9d9d9;

            font-size: 13px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 4px;
        }
        
        .flow-timeline-item.completed .flow-timeline-title {

        }
        
        .flow-timeline-item.active .flow-timeline-title {

        .flow-timeline-time {

            color: #8c8c8c;
            margin-bottom: 4px;
        }
        
        .flow-timeline-desc {
            font-size: 12px;
            color: #595959;
            line-height: 1.5;
        }
        
        .flow-timeline-status {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-top: 4px;
        }
        
        .flow-timeline-status.completed {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        
        .flow-timeline-status.processing {
            background: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
        }
        
        .flow-timeline-status.pending {
            background: #f5f5f5;
            color: #8c8c8c;
            border: 1px solid #d9d9d9;
        }
        
        .flow-timeline-header {
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;

        .stat-card {
            background: white;
            border: 1px solid #e8e8e8;

            padding: 16px;
            display: flex;

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

        .stat-icon.blue { background: #e6f7ff; color: #1890ff; }

        .stat-icon.green { background: #f6ffed; color: #52c41a; }
        .stat-icon.red { background: #fff1f0; color: #ff4d4f; }
        
        .stat-info {

        .stat-value {

            font-weight: 700;
            color: #262626;
            line-height: 1;

            background-position: right 8px center;
            padding-right: 24px;
        }

                severity: '轻微',
                clause: 'GB/T 19001-2016 标准 8.6 条款',
                department: '质量管理部门',
                auditor: '王洪伟',
                submitTime: '2024-04-15 14:30',
                customerSubmitTime: '2024-04-16 09:20',
                confirmTime: null,
                deptProcess: '质量管理部门/检验过程',
                nature: '轻微',
                deadline: '2024-04-25',
                flowLog: [
                    { node: '提交不符合描述', time: '2024-04-15 14:30', operator: '王洪伟', status: 'completed', desc: '不符合项描述已提交' },
                    { node: '客户原因分析和纠正措施', time: '2024-04-16 09:20', operator: '客户', status: 'completed', desc: '客户已提交原因分析及纠正措施' },
                    { node: '跟踪确认', time: '-', operator: '组长', status: 'processing', desc: '请选择跟踪结论并提交' }
                ]
            },
            {
                id: 4,
                status: 'confirmed',
                description: '审核发现环境管理部门的废弃物分类标识不清晰，危险废物与一般废物混放。',
                reason: '新员工对分类标准不熟悉，标识牌老化褪色。',
                correction: '1. 更换清晰的标识牌；2. 对相关人员重新培训；3. 建立日常检查机制。',
                tracking: 'accepted',
                severity: '轻微',
                clause: 'GB/T 24001-2016 标准 8.1 条款',
                department: '环境管理部门',
                auditor: '王洪伟',
                submitTime: '2024-04-15 16:00',
                customerSubmitTime: '2024-04-17 10:00',
                confirmTime: '2024-04-18 14:30',
                deptProcess: '环境管理部门/废弃物管理',
                nature: '轻微',
                deadline: '2024-04-20',
                flowLog: [
                    { node: '提交不符合描述', time: '2024-04-15 16:00', operator: '王洪伟', status: 'completed', desc: '不符合项描述已提交' },
                    { node: '客户原因分析和纠正措施', time: '2024-04-17 10:00', operator: '客户', status: 'completed', desc: '客户已提交原因分析及纠正措施' },
                    { node: '跟踪确认', time: '2024-04-18 14:30', operator: '武荣刚', status: 'completed', desc: '纠正措施有效，不符合项关闭' }
                ]
            }
        ];

        let currentFilter = 'all';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderRectificationNCRList();
            updateRectificationStats();
        });

        // 切换节点提示
        function switchNode(index) {
            if (index === 3) {
                // 当前已在整改问题跟踪节点
                return;
            } else if (index < 3) {
                alert('已完成的历史节点，请在"审核进行中"查看历史记录');
            } else if (index === 4) {
                alert('请先完成所有不符合项的整改确认，才能进入任务已完成节点');
            }
        }

        // 返回
        function goBack() {
            if (confirm('确定返回列表页？')) {
                console.log('返回列表页');
            }
        }

        // 获取状态配置
        function getStatusConfig(status) {
            const config = {
                'pending_customer': { text: '待客户确认', badgeClass: 'badge-warning' },
                'pending_leader': { text: '待审核组长确认', badgeClass: 'badge-processing' },
                'confirmed': { text: '已确认', badgeClass: 'badge-success' }
            };
            return config[status] || { text: '未知', badgeClass: 'badge-draft' };
        }

        // 渲染整改问题跟踪节点的不符合项列表
        function renderRectificationNCRList() {
            const container = document.getElementById('rectificationNcrContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            // 过滤数据：只显示非草稿状态，且符合筛选条件
            let filteredData = ncrData.filter(ncr => ncr.status !== 'draft');
            
            if (currentFilter !== 'all') {
                filteredData = filteredData.filter(ncr => ncr.status === currentFilter);
            }
            
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-clipboard-check"></i>
                        <p>暂无需要跟踪的不符合项</p>
                        <p class="text-xs text-gray-400 mt-2">所有不符合项已关闭或未提交至客户</p>
                    </div>
                `;
                return;
            }
            
            filteredData.forEach((ncr) => {
                const originalIndex = ncrData.findIndex(item => item.id === ncr.id);
                const card = createRectificationNCRCard(ncr, originalIndex);
                container.appendChild(card);
            });
        }
        
        // 创建整改问题跟踪节点的不符合项卡片
        function createRectificationNCRCard(ncr, originalIndex) {
            const card = document.createElement('div');
            card.className = 'ncr-card';
            
            const statusConfig = getStatusConfig(ncr.status);
            
            let flowLogHtml = '';
            if (ncr.flowLog && ncr.flowLog.length > 0) {
                flowLogHtml = ncr.flowLog.map((log) => {
                    const statusClass = log.status;
                    const statusText = log.status === 'completed' ? '已完成' : (log.status === 'processing' ? '进行中' : '待处理');
                    const icon = log.status === 'completed' ? 'fa-check' : (log.status === 'processing' ? 'fa-spinner fa-spin' : 'fa-clock');
                    
                    return `
                        <div class="flow-timeline-item ${statusClass}">
                            <div class="flow-timeline-dot"></div>
                            <div class="flow-timeline-title">${log.node}</div>
                            <div class="flow-timeline-time"><i class="fas fa-user-circle mr-1"></i>${log.operator} · ${log.time}</div>
                            <div class="flow-timeline-desc">${log.desc}</div>
                            <span class="flow-timeline-status ${statusClass}"><i class="fas ${icon} mr-1"></i>${statusText}</span>
                        </div>
                    `;
                }).join('');
            }
            
            // 整改问题跟踪节点特有的操作按钮
            let actionButtons = '';
            if (ncr.status === 'pending_leader') {
                actionButtons = `
                    <button class="btn btn-primary btn-sm" onclick="confirmTracking(${originalIndex})">
                        <i class="fas fa-check text-xs"></i>
                        确认跟踪结论
                    </button>
                `;
            } else if (ncr.status === 'pending_customer') {
                actionButtons = `
                    <button class="btn btn-default btn-sm" disabled>
                        <i class="fas fa-clock text-xs"></i>
                        等待客户反馈
                    </button>
                `;
            } else if (ncr.status === 'confirmed') {
                actionButtons = `
                    <button class="btn btn-success btn-sm" disabled>
                        <i class="fas fa-check-circle text-xs"></i>
                        已关闭
                    </button>
                `;
            }
            
            // 判断是否逾期
            const isOverdue = new Date(ncr.deadline) < new Date() && ncr.status !== 'confirmed';
            const deadlineStyle = isOverdue ? 'color: #ff4d4f; font-weight: 600;' : '';
            const overdueTag = isOverdue ? ' <span style="color: #ff4d4f; font-size: 12px;">(已逾期)</span>' : '';
            
            card.innerHTML = `
                <div class="ncr-left">
                    <div class="ncr-header">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-weight: 600; color: #262626;">不符合项 #${ncr.id}</span>
                            <span class="status-badge ${statusConfig.badgeClass}">${statusConfig.text}</span>
                            <span class="personnel-tag tag-qms">${ncr.auditor}</span>
                            <span style="font-size: 12px; color: #8c8c8c;">${ncr.clause}</span>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            ${actionButtons}
                        </div>
                    </div>
                    
                    <div style="padding: 0 16px 16px 16px;">
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; padding: 12px; background: #f5f5f5; border-radius: 4px; font-size: 13px; color: #595959;">
                            <div>
                                <span style="color: #8c8c8c;">受审核部门/过程：</span>
                                <span style="font-weight: 500;">${ncr.deptProcess || '-'}</span>
                            </div>
                            <div>
                                <span style="color: #8c8c8c;">性质：</span>
                                <span class="status-badge ${ncr.nature === '严重' ? 'badge-error' : 'badge-warning'}" style="margin-left: 0;">${ncr.nature || '-'}</span>
                            </div>
                            <div>
                                <span style="color: #8c8c8c;">整改完成期限：</span>
                                <span style="${deadlineStyle}">${ncr.deadline || '-'}${overdueTag}</span>
                            </div>
                        </div>
                        
                        <div class="ncr-section">
                            <div class="ncr-section-title">
                                <i class="fas fa-exclamation-circle text-red-500"></i>
                                不符合项描述
                            </div>
                            <div class="ncr-section-content" style="border: 1px solid transparent; padding: 12px;">
                                ${ncr.description}
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                            <div class="ncr-section">
                                <div class="ncr-section-title">
                                    <i class="fas fa-search text-blue-500"></i>
                                    原因分析
                                </div>
                                <div class="ncr-section-content" style="border: 1px solid transparent; padding: 12px;">
                                    ${ncr.reason || '<span style="color: #bfbfbf;">等待客户填写...</span>'}
                                </div>
                            </div>
                            
                            <div class="ncr-section">
                                <div class="ncr-section-title">
                                    <i class="fas fa-wrench text-orange-500"></i>
                                    纠正、纠正措施或纠正措施计划
                                </div>
                                <div class="ncr-section-content" style="border: 1px solid transparent; padding: 12px;">
                                    ${ncr.correction || '<span style="color: #bfbfbf;">等待客户填写...</span>'}
                                </div>
                            </div>
                        </div>
                        
                        ${ncr.status === 'pending_leader' ? `
                        <div class="ncr-section" style="border: 2px solid #1890ff; border-radius: 4px; padding: 12px; background: #e6f7ff;">
                            <div class="ncr-section-title" style="color: #1890ff;">
                                <i class="fas fa-clipboard-check"></i>
                                组长跟踪确认
                                <span style="color: #ff4d4f; font-size: 12px; margin-left: 8px;">* 请选择跟踪结论并提交</span>
                            </div>
                            <div class="radio-group" style="background: white; padding: 12px; border-radius: 4px;">
                                <label class="radio-item">
                                    <input type="radio" name="rect-tracking-${originalIndex}" value="accepted" ${ncr.tracking === 'accepted' ? 'checked' : ''}>
                                    <span>纠正和纠正措施可以接受且证实有效。</span>
                                </label>
                                <label class="radio-item">
                                    <input type="radio" name="rect-tracking-${originalIndex}" value="plan_accepted" ${ncr.tracking === 'plan_accepted' ? 'checked' : ''}>
                                    <span>纠正和纠正措施计划可以接受，将在下次审核中验证有效性。（仅针对轻微不符合）</span>
                                </label>
                                <label class="radio-item">
                                    <input type="radio" name="rect-tracking-${originalIndex}" value="rejected" ${ncr.tracking === 'rejected' ? 'checked' : ''}>
                                    <span>纠正和纠正措施不能接受，或纠正措施未有效实施。</span>
                                </label>
                            </div>
                        </div>
                        ` : `
                        <div class="ncr-section">
                            <div class="ncr-section-title">
                                <i class="fas fa-clipboard-check text-green-500"></i>
                                跟踪结论
                            </div>
                            <div class="ncr-section-content" style="border: 1px solid transparent; padding: 12px;">
                                ${ncr.tracking === 'accepted' ? '<span style="color: #52c41a; font-weight: 500;"><i class="fas fa-check-circle"></i> 纠正和纠正措施可以接受且证实有效</span>' : 
                                  ncr.tracking === 'plan_accepted' ? '<span style="color: #1890ff; font-weight: 500;"><i class="fas fa-check-circle"></i> 纠正和纠正措施计划可以接受，将在下次审核中验证</span>' : 
                                  ncr.tracking === 'rejected' ? '<span style="color: #ff4d4f; font-weight: 500;"><i class="fas fa-times-circle"></i> 纠正和纠正措施不能接受，或纠正措施未有效实施</span>' : 
                                  '<span style="color: #bfbfbf;">等待组长确认...</span>'}
                            </div>
                        </div>
                        `}
                    </div>
                </div>
                
                <div class="ncr-right">
                    <div class="flow-timeline-header">
                        <i class="fas fa-stream text-blue-500"></i>
                        流程日志
                    </div>
                    <div class="flow-timeline">
                        ${flowLogHtml || '<div style="color: #8c8c8c; font-size: 12px; padding-left: 16px;">暂无流程记录</div>'}
                    </div>
                </div>
            `;
            
            return card;
        }
        
        // 整改问题跟踪节点：确认跟踪结论
        function confirmTracking(index) {
            const ncr = ncrData[index];
            const trackingRadios = document.getElementsByName(`rect-tracking-${index}`);
            let tracking = null;
            for (let radio of trackingRadios) {
                if (radio.checked) {
                    tracking = radio.value;
                    break;
                }
            }
            
            if (!tracking) {
                alert('请选择跟踪结论');
                return;
            }
            
            if (!confirm('确定提交跟踪结论吗？提交后该不符合项将关闭。')) {
                return;
            }
            
            ncr.tracking = tracking;
            ncr.status = 'confirmed';
            ncr.confirmTime = new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');
            
            // 更新流程日志
            if (ncr.flowLog && ncr.flowLog[2]) {
                ncr.flowLog[2].status = 'completed';
                ncr.flowLog[2].time = ncr.confirmTime;
                ncr.flowLog[2].desc = tracking === 'accepted' ? '纠正措施有效，不符合项关闭' : 
                                      tracking === 'plan_accepted' ? '纠正措施计划可接受，下次审核验证' : 
                                      '纠正措施无效，需要重新整改';
            }
            
            showToast('跟踪确认完成，不符合项已关闭', 'success');
            renderRectificationNCRList();
            updateRectificationStats();
        }
        
        // 筛选不符合项
        function filterNCR(status) {
            currentFilter = status;
            renderRectificationNCRList();
        }
        
        // 更新统计数据
        function updateRectificationStats() {
            const nonDraft = ncrData.filter(ncr => ncr.status !== 'draft');
            document.getElementById('statTotal').textContent = nonDraft.length;
            document.getElementById('statPendingCustomer').textContent = nonDraft.filter(ncr => ncr.status === 'pending_customer').length;
            document.getElementById('statPendingLeader').textContent = nonDraft.filter(ncr => ncr.status === 'pending_leader').length;
            document.getElementById('statConfirmed').textContent = nonDraft.filter(ncr => ncr.status === 'confirmed').length;
        }

        // 显示提示
        function showToast(message, type) {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? '#52c41a' : (type === 'warning' ? '#fa8c16' : '#1890ff');
            toast.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: ${bgColor}; color: white; padding: 10px 20px; border-radius: 4px; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.15);`;
            toast.innerHTML = `<i class="fas fa-check-circle mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
