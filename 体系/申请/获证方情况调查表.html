<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证监督申请表单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
        }

        .form-section {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            scroll-margin-top: 160px;
        }

        .form-section:hover {
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.1);
        }

        .conditional-field {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }

        .conditional-field.active {
            max-height: 2000px;
            opacity: 1;
            margin-top: 0.75rem;
        }

        .nav-item {
            position: relative;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #2563eb;
            transition: width 0.3s ease;
        }

        .nav-item.active {
            color: #2563eb;
            font-weight: 600;
        }

        .nav-item.active::after {
            width: 100%;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .required::after {
            content: "*";
            color: #ef4444;
            margin-left: 4px;
        }

        /* 统一表单项高度 - 36px */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="month"],
        select,
        textarea {
            min-height: 36px !important;
            padding: 8px 12px !important;
            font-size: 13px !important;
            line-height: 20px !important;
            border: 1px solid #d1d5db !important;
            border-radius: 6px !important;
            background: white !important;
            transition: all 0.2s !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
        }

        input:read-only,
        input:disabled,
        select:disabled {
            background: #f3f4f6 !important;
            cursor: not-allowed !important;
        }

        /* 小模块标题样式 */
        .sub-section-title {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            margin: 20px 0 12px 0;
            border-radius: 0 8px 8px 0;
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-section-title i {
            color: #3b82f6;
        }

        /* 体系卡片样式 */
        .system-card {
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        .system-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .system-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 8px 30px -8px rgba(59, 130, 246, 0.25);
        }

        /* 表格样式优化 */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }

        .data-table th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        .data-table tr:hover td {
            background: #f8fafc;
        }

        .data-table input,
        .data-table select,
        .data-table textarea {
            min-height: 32px !important;
            padding: 6px 10px !important;
            font-size: 13px !important;
        }

        /* 切换开关样式 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3b82f6;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 变更项卡片 - 与ok.html的file-upload-card风格统一 */
        .change-item-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .change-item-card:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }

        /* 文件上传区域 */
        .file-upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: #f9fafb;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-upload-area:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .file-upload-area.has-file {
            border-style: solid;
            border-color: #22c55e;
            background: #f0fdf4;
        }

        /* 必填标记样式统一 */
        .form-field label.required::after {
            content: '*';
            color: #dc2626;
            margin-left: 2px;
        }

        @media (max-width: 1024px) {
            .form-grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .form-grid-4 {
                grid-template-columns: 1fr;
            }
        }
    
        /* 过程名称模糊搜索下拉框样式 */
        .process-name-wrapper {
            position: relative;
        }

        .process-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            margin-top: 4px;
        }

        .process-dropdown.hidden {
            display: none;
        }

        .process-dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
            transition: all 0.2s;
        }

        .process-dropdown-item:hover,
        .process-dropdown-item.highlighted {
            background-color: #eff6ff;
            color: #2563eb;
        }

        .process-dropdown-item:last-child {
            border-bottom: none;
        }

        .process-dropdown-no-match {
            padding: 12px;
            text-align: center;
            color: #9ca3af;
            font-size: 12px;
        }

        .process-dropdown-hint {
            padding: 6px 12px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 11px;
            color: #64748b;
        }



        /* 附件上传区域 - 新样式 */
        .attachment-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .attachment-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px -2px rgba(59, 130, 246, 0.15);
        }

        .attachment-card.has-files {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .attachment-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attachment-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .attachment-icon.pdf-icon {
            background: #fef2f2;
            color: #dc2626;
        }

        .attachment-icon.doc-icon {
            background: #eff6ff;
            color: #2563eb;
        }

        .attachment-icon.img-icon {
            background: #f0fdf4;
            color: #059669;
        }

        .attachment-info {
            flex: 1;
            min-width: 0;
        }

        .attachment-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .attachment-title .title-text {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
        }

        .required-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #fef2f2;
            color: #dc2626;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            border: 1px solid #fecaca;
        }

        .optional-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #f3f4f6;
            color: #6b7280;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
        }

        .attachment-meta {
            font-size: 12px;
            color: #6b7280;
        }

        .file-count {
            display: inline-flex;
            align-items: center;
        }

        .file-count.has-files {
            color: #059669;
            font-weight: 500;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #3b82f6;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .upload-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        .attachment-files {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .attachment-files:empty {
            display: none;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #dcfce7;
            border: 1px solid #86efac;
            border-radius: 6px;
            font-size: 12px;
            color: #166534;
            max-width: 100%;
        }

        .file-tag-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .file-tag-size {
            color: #22c55e;
            font-size: 11px;
            flex-shrink: 0;
        }

        .file-tag-remove {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            color: #16a34a;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .file-tag-remove:hover {
            background: #bbf7d0;
            color: #dc2626;
        }



        /* CQC电子公章样式 */
        .cqc-seal {
            position: relative;
            width: 140px;
            height: 140px;
            display: inline-block;
        }

        #cqcSealCanvas {
            width: 100%;
            height: 100%;
        }

        /* 减少场所卡片样式 */
        input[type="checkbox"][name="removeLocation"] {
            min-height: auto !important;
            width: auto !important;
        }

        input[type="checkbox"][name="removeLocation"]:checked + div {
            opacity: 0.6;
            text-decoration: line-through;
        }

        /* 验证状态样式 */
        input.border-green-500 {
            border-color: #22c55e !important;
            background-color: #f0fdf4 !important;
        }

        input.border-red-500 {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        /* 金额突出显示 */
        .text-2xl.font-bold.text-amber-700 {
            text-shadow: 0 1px 2px rgba(217, 119, 6, 0.1);
        }
</style>
</head>
<body class="text-slate-800 bg-slate-50 pb-32">

        <!-- 4. 获证方情况调查表 -->
        <div id="section-survey" class="form-section bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center justify-between cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleSection(this)">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-xs font-bold">4</div>
                    <h3 class="font-semibold text-slate-900">获证方情况调查表</h3>
                </div>
                <div class="flex items-center gap-2">
                    <span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-medium border border-purple-200">监督审核适用</span>
                    <i class="fas fa-chevron-down text-slate-400 transition-transform duration-300 text-xs"></i>
                </div>
            </div>

            <div class="p-6 space-y-6 transition-all duration-300" style="max-height: 4000px; overflow: visible;">
                <!-- 客户名称与业务评审 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-4 border-b border-slate-100">
                    <div class="form-field">
                        <label class="text-xs font-medium text-slate-700 mb-1 block">客户名称</label>
                        <input type="text" value="示例科技有限公司" readonly>
                    </div>
                    <div class="flex items-end pb-1">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <span class="text-sm font-medium text-slate-700">是否需要业务评审</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="needBusinessReview" onchange="toggleBusinessReview(this.checked)">
                                <span class="slider"></span>
                            </label>
                            <span class="text-xs text-slate-500" id="reviewStatusText">否（默认）</span>
                        </label>
                    </div>
                </div>

                <div class="sub-section-title">
                    <i class="fas fa-clipboard-check"></i>
                    自上次审核以来是否有变更
                </div>

                <!-- 变更信息列表 -->
                <div id="changeItemsList" class="space-y-3">
                    <!-- 动态生成变更项 -->
                </div>

                <!-- 审核日期确认 -->
                <div class="pt-4 border-t border-slate-100">
                    <label class="block text-xs font-medium text-slate-700 mb-3">是否同意《监督审核通知书》中的审核日期</label>
                    <div class="flex gap-6 mb-3">
                        <label class="flex items-center gap-2 cursor-pointer p-3 bg-slate-50 rounded-lg border border-slate-200 hover:border-blue-300 hover:bg-blue-50 transition-all">
                            <input type="radio" name="agreeDate" value="yes" checked class="text-blue-600" onchange="toggleDateChange(false)">
                            <span class="text-sm text-slate-700">是，同意该审核日期</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer p-3 bg-slate-50 rounded-lg border border-slate-200 hover:border-blue-300 hover:bg-blue-50 transition-all">
                            <input type="radio" name="agreeDate" value="no" class="text-blue-600" onchange="toggleDateChange(true)">
                            <span class="text-sm text-slate-700">否，需要调整日期</span>
                        </label>
                    </div>
                    
                    <div id="dateChangeFields" class="conditional-field space-y-3 bg-amber-50 p-4 rounded-lg border border-amber-100">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div class="form-field">
                                <label class="text-xs font-medium text-slate-700 mb-1 block required">希望的现场审核日期</label>
                                <input type="date">
                            </div>
                            <div class="form-field">
                                <label class="text-xs font-medium text-slate-700 mb-1 block required">不能安排实施现场审核的原因</label>
                                <input type="text" maxlength="500" placeholder="请详细说明原因">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 签名区域 - 已移除电子签功能，改为传统确认方式 -->
                <div class="pt-6 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-field">
                        <label class="text-xs font-medium text-slate-700 mb-1 block required">客户代表（姓名）</label>
                        <input type="text" placeholder="请输入客户代表姓名">
                    </div>
                    <div class="form-field">
                        <label class="text-xs font-medium text-slate-700 mb-1 block">提交日期</label>
                        <input type="date" id="surveySubmitDate" readonly>
                    </div>
                </div>

                <div class="p-4 bg-slate-50 rounded-lg border border-slate-200 text-xs text-slate-600 space-y-2">
                    <p class="font-medium text-slate-700 mb-2">注意事项：</p>
                    <p><strong>注1：</strong>若根据变更信息需要变更认证证书的，则还应请客户提交《证书变更申请书》；</p>
                    <p><strong>注2：</strong>若客户属于多场所组织且场所发生了变更，则还应请客户提交最新的《认证场所清单》；</p>
                    <p><strong>注3：</strong>列明除建筑施工（28大类）、建筑监理（34.01.01）、开采业（02）之外的、正在实施以及已经签订合同，拟在半年内实施的服务项目。</p>
                </div>
            </div>
        </div>

        

    </div>


    <!-- 提示消息 -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle text-green-400"></i>
        <span id="toastMessage">操作成功</span>
    </div>

    <script>
        // 全局状态
        let processCounter = 0;
        let locationCounters = { QMS: 0, EMS: 0 };
        let currentSignatureType = '';
        let isDrawing = false;
        let ctx = null;

        // 变更项配置
        const changeItems = [
            { id: 'orgName', name: '组织名称', hasDesc: true },
            { id: 'businessScope', name: '营业执照的经营范围、资质许可的范围', hasDesc: true },
            { id: 'legalStatus', name: '法律地位或所有权', hasDesc: true },
            { id: 'address', name: '注册地址或运营地址', hasDesc: true },
            { id: 'topManager', name: '最高管理者（法定代表人、总经理、管理体系负责人等）', hasDesc: true },
            { id: 'contact', name: '联系人/联系方式', hasDesc: false, alwaysShow: true },
            { id: 'orgStructure', name: '组织机构', hasDesc: true },
            { id: 'staffCount', name: '组织人数或体系覆盖人数', hasDesc: false, alwaysShow: true },
            { id: 'branches', name: '分支机构/常设多场所', hasDesc: true },
            { id: 'mainProcess', name: '管理体系的主要过程', hasDesc: true },
            { id: 'productService', name: '产品/服务（或业务）', hasDesc: true },
            { id: 'facilities', name: '主要生产（服务）设施设备', hasDesc: true },
            { id: 'documentation', name: '体系文件化信息', hasDesc: true },
            { id: 'tempSites', name: '临时服务现场信息', hasDesc: true },
            { id: 'outsourcing', name: '外部提供的职能或过程（外包）', hasDesc: true },
            { id: 'externalServices', name: '在本组织之外其他场所提供的服务', hasDesc: true },
            { id: 'ims', name: '整合管理体系（IMS）的整合程度', hasDesc: true },
            { id: 'emergency', name: '应急或业务连续性演练活动的日期安排情况（BCMS适用）', hasDesc: true },
            { id: 'incidents', name: '是否发生过不良信息事件（如重大事故/行政检查和抽查发现的问题）', hasDesc: true },
            { id: 'blacklist', name: '是否被市场监管部门列入异常经营名录、严重违法失信名单', hasDesc: true }
        ];

        
        // 历史过程名称数据（模拟数据库）
        const processHistoryData = [
            '文件控制过程',

            hint.textContent = isHistory ? '最近使用' : `找到 ${items.length} 个匹配项`;
            dropdown.appendChild(hint);

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'process-dropdown-item';

                // 高亮匹配文本
                if (highlightText) {
                    const regex = new RegExp(`(${highlightText})`, 'gi');

                    input.value = item;
                    dropdown.classList.add('hidden');

        // CQC电子公章绘制
        function drawCQCSeal() {
            try {
                const canvas = document.getElementById('cqcSealCanvas');
                const svg = document.getElementById('cqcSealSVG');

                if (!canvas) {
                    console.warn('Canvas element not found, showing SVG backup');
                    if (svg) svg.style.display = 'block';
                    return;
                }

                // 设置canvas实际尺寸
                canvas.width = 140;
                canvas.height = 140;

                const ctx = canvas.getContext('2d');
                if (!ctx) {
                    console.warn('Canvas context not available, showing SVG backup');
                    canvas.style.display = 'none';
                    if (svg) svg.style.display = 'block';
                    return;
                }

                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const radius = 60;

                // 清除画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 绘制外圆
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#dc2626';
                ctx.lineWidth = 3;
                ctx.stroke();

                // 绘制内圆
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius - 8, 0, Math.PI * 2);
                ctx.strokeStyle = '#dc2626';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 绘制文字 - 上半部分（中国质量认证中心）
                ctx.fillStyle = '#dc2626';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // 使用系统默认中文字体
                ctx.font = 'bold 14px "Microsoft YaHei", "SimHei", "Noto Sans SC", sans-serif';

                const text = '中国质量认证中心';
                const textRadius = radius - 18;

                // 计算起始角度，让文字居中显示在上方
                const totalAngle = Math.PI * 0.8; // 文字占据的角度范围
                const startAngle = Math.PI * 1.5 - totalAngle / 2; // 从上方开始
                const angleStep = totalAngle / (text.length - 1);

                for (let i = 0; i < text.length; i++) {
                    const angle = startAngle + i * angleStep;
                    const x = centerX + Math.cos(angle) * textRadius;
                    const y = centerY + Math.sin(angle) * textRadius;

                    ctx.save();
                    ctx.translate(x, y);
                    // 旋转角度，让文字沿圆弧方向
                    ctx.rotate(angle + Math.PI / 2);
                    ctx.fillText(text[i], 0, 0);
                    ctx.restore();
                }

                // 绘制中间五角星
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#dc2626';
                drawStar(ctx, 0, 0, 5, 14, 7);
                ctx.restore();

                // 绘制文字 - 下半部分（英文缩写CQC）
                ctx.font = 'bold 12px Arial, sans-serif';
                const engText = 'CQC';
                const engRadius = radius - 18;
                const engTotalAngle = Math.PI * 0.4;
                const engStartAngle = Math.PI * 0.5 - engTotalAngle / 2;
                const engAngleStep = engTotalAngle / (engText.length - 1);

                for (let i = 0; i < engText.length; i++) {
                    const angle = engStartAngle + i * engAngleStep;
                    const x = centerX + Math.cos(angle) * engRadius;
                    const y = centerY + Math.sin(angle) * engRadius;

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angle + Math.PI / 2);
                    ctx.fillText(engText[i], 0, 0);
                    ctx.restore();
                }

                // 隐藏SVG，显示Canvas
                canvas.style.display = 'block';
                if (svg) svg.style.display = 'none';

                console.log('Seal drawn successfully');
            } catch (error) {
                console.error('Error drawing seal:', error);
                // 显示SVG备用
                const canvas = document.getElementById('cqcSealCanvas');
                const svg = document.getElementById('cqcSealSVG');
                if (canvas) canvas.style.display = 'none';
                if (svg) svg.style.display = 'block';
            }
        }

        // 绘制五角星辅助函数
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

            addLocationRow('EMS', {
                name: '北京总部',
                address: '北京市朝阳区xxx路xxx号',
                activity: '软件开发、系统集成（环境管理）',
                shift: '08:00-17:00',
                staff: 120,
                contact: '张三',
                phone: '13800138000',
                subcert: 'no'
            });
        }

        // 添加场所行
        function addLocationRow(system, data = {}) {
            locationCounters[system]++;
            const tbody = document.getElementById(`locationList_${system}`);
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-slate-50 transition-colors';
            tr.innerHTML = `
                <td class="text-slate-500 font-medium">${locationCounters[system]}</td>
                <td><input type="text" value="${data.name || ''}" placeholder="场所名称"></td>
                <td><input type="text" value="${data.address || ''}" placeholder="详细地址"></td>
                <td><textarea maxlength="500" rows="2" placeholder="涉及的产品、过程、活动">${data.activity || ''}</textarea></td>
                <td><input type="text" value="${data.shift || ''}" placeholder="班次时间"></td>
                <td><input type="number" value="${data.staff || ''}" placeholder="人数"></td>
                <td><input type="text" value="${data.contact || ''}" placeholder="联系人"></td>
                <td><input type="text" value="${data.phone || ''}" placeholder="电话"></td>
                <td>
                    <select>
                        <option value="no" ${data.subcert === 'no' ? 'selected' : ''}>否</option>
                        <option value="yes" ${data.subcert === 'yes' ? 'selected' : ''}>是</option>
                    </select>
                </td>
                <td class="text-center">
                    <button onclick="this.closest('tr').remove(); renumberLocationRows('${system}')" class="text-red-600 hover:text-red-800 p-1 hover:bg-red-50 rounded transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        // 重新编号场所行
        function renumberLocationRows(system) {
            const rows = document.querySelectorAll(`#locationList_${system} tr`);
            rows.forEach((row, index) => {
                row.cells[0].textContent = index + 1;
            });
            locationCounters[system] = rows.length;
        }

        // 切换变更项显示
        function toggleChangeItem(checkbox) {
            const targetId = checkbox.dataset.target;
            const target = document.getElementById(targetId);
            if (checkbox.checked) {
                target.classList.add('active');
            } else {
                target.classList.remove('active');
            }
        }

        // 切换人员数量变化
        function toggleStaffChange(value) {
            const input = document.getElementById('staffChangeCount');
            if (value === 'none') {
                input.classList.add('hidden');
            } else {
                input.classList.remove('hidden');
                input.focus();
            }
        }

        // 切换场所变更类型
        function toggleLocationChangeType(value) {
            const addFields = document.getElementById('addLocationFields');
            const removeFields = document.getElementById('removeLocationFields');
            
            if (value === 'add') {
                addFields.classList.remove('hidden');
                removeFields.classList.add('hidden');
            } else if (value === 'remove') {
                addFields.classList.add('hidden');
                removeFields.classList.remove('hidden');
            } else {
                addFields.classList.add('hidden');
                removeFields.classList.add('hidden');
            }
        }

        // 文件上传处理
        function handleFileUpload(input) {
            if (input.files && input.files.length > 0) {
                const fileNames = Array.from(input.files).map(f => f.name).join(', ');
                showToast(`已选择 ${input.files.length} 个文件: ${fileNames}`);
                
                const uploadArea = input.parentElement;
                uploadArea.classList.add('has-file');
                uploadArea.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="fas fa-check-circle text-green-500 text-2xl"></i>
                        <div class="text-left">
                            <p class="text-sm font-medium text-slate-700">已选择 ${input.files.length} 个文件</p>
                            <p class="text-xs text-slate-500">${fileNames}</p>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); resetFileUpload(this)" class="mt-2 px-3 py-1 text-xs text-red-600 hover:bg-red-50 rounded border border-red-200">
                        重新选择
                    </button>
                `;
            }
        }

        function resetFileUpload(btn) {
            const uploadArea = btn.parentElement;
            uploadArea.classList.remove('has-file');
            uploadArea.innerHTML = `
                <i class="fas fa-cloud-upload-alt text-3xl text-slate-400 mb-2"></i>
                <p class="text-sm text-slate-600">点击上传附件（PDF、Word、图片格式）</p>
                <p class="text-xs text-slate-400 mt-1">支持多文件上传，单个文件不超过20MB</p>
                <input type="file" multiple class="hidden" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onchange="handleFileUpload(this)">
            `;
        }

        function saveDraft() {

        }

        // 提交表单
        function submitForm() {
            const needReview = document.getElementById('needBusinessReview').checked;
            if (needReview) {
                if (!confirm('您选择了"需要业务评审"，提交后将进入业务评审流程。是否确认提交？')) {
                    return;
                }
            }
            
            showToast('申请已提交成功！');
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            msg.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle text-red-400';
            } else if (type === 'warning') {
                icon.className = 'fas fa-exclamation-triangle text-yellow-400';
            } else {
                icon.className = 'fas fa-check-circle text-green-400';
            }
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
