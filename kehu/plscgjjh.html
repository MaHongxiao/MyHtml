<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量创建跟进计划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-in { animation: animateIn 0.3s ease-out; }
        @keyframes animateIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center p-4">

    <!-- 背景遮罩 -->
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40"></div>

    <!-- 批量创建跟进计划弹窗 -->
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-6xl max-h-[92vh] overflow-hidden pointer-events-auto animate-in flex flex-col">
            
            <!-- 弹窗头部 -->
            <div class="px-8 py-5 border-b border-gray-200 flex justify-between items-center bg-gradient-to-r from-blue-600 to-blue-700 text-white shrink-0">
                <div>
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i class="fas fa-layer-group"></i>
                        批量创建跟进计划
                    </h2>
                    <p class="text-blue-100 text-sm mt-1">已选择 <span id="headerCount">7</span> 条线索，系统将自动区分新客户与已有客户</p>
                </div>
                <button onclick="window.close()" class="text-white/80 hover:text-white hover:bg-white/20 rounded-full p-2 transition-all">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <!-- 弹窗主体 -->
            <div class="flex-1 overflow-hidden flex min-h-0">
                
                <!-- 左侧：已选线索列表（7条假数据） -->
                <div class="w-[380px] border-r border-gray-200 bg-gray-50 flex flex-col shrink-0">
                    <div class="px-5 py-3 border-b border-gray-200 bg-white flex justify-between items-center shrink-0">
                        <h3 class="font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-check-square text-blue-600"></i>
                            已选线索列表
                        </h3>
                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-medium" id="totalCount">7条</span>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-3" id="clueList">
                        <!-- 线索卡片将通过JS渲染 -->
                    </div>
                    
                    <!-- 统计面板 -->
                    <div class="p-4 bg-white border-t border-gray-200 shrink-0 space-y-3">
                        <div class="flex items-center justify-between p-2 bg-orange-50 rounded-lg border border-orange-100">
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full bg-orange-500"></div>
                                <span class="text-sm font-medium text-gray-700">新客户</span>
                            </div>
                            <span class="text-lg font-bold text-orange-600" id="newCount">0</span>
                        </div>
                        <div class="flex items-center justify-between p-2 bg-green-50 rounded-lg border border-green-100">
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                                <span class="text-sm font-medium text-gray-700">已有客户</span>
                            </div>
                            <span class="text-lg font-bold text-green-600" id="existingCount">0</span>
                        </div>
                        <div class="pt-2 border-t border-gray-100 text-xs text-gray-500 text-center">
                            系统将根据客户类型自动分配跟进人
                        </div>
                    </div>
                </div>

                <!-- 右侧：表单配置 -->
                <div class="flex-1 overflow-y-auto custom-scrollbar bg-white">
                    <div class="p-8 space-y-6">
                        
                        <!-- 差异化处理说明 -->
                        <div class="bg-blue-50 border-l-4 border-blue-500 rounded-r-lg p-4 flex items-start gap-3">
                            <i class="fas fa-info-circle text-blue-500 mt-0.5"></i>
                            <div class="text-sm text-blue-800 space-y-1">
                                <p class="font-semibold">智能分配规则说明</p>
                                <p class="opacity-90">• 已有客户：跟进计划将自动关联至客户主要跟进人，无需手动指定</p>
                                <p class="opacity-90">• 新客户：需在下方统一设置负责营销人员，系统将批量分配</p>
                            </div>
                        </div>

                        <!-- 基础信息 -->
                        <div class="grid grid-cols-2 gap-5">
                            <div class="space-y-1.5">
                                <label class="block text-sm font-semibold text-gray-700">
                                    <span class="text-red-500 mr-1">*</span>计划联系日期
                                </label>
                                <div class="relative">
                                    <input type="datetime-local" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                                    <i class="fas fa-calendar-alt absolute right-3 top-2.5 text-gray-400"></i>
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="block text-sm font-semibold text-gray-700">
                                    <span class="text-red-500 mr-1">*</span>计划截止日期
                                </label>
                                <div class="relative">
                                    <input type="datetime-local" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                                    <i class="fas fa-calendar-check absolute right-3 top-2.5 text-gray-400"></i>
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="block text-sm font-semibold text-gray-700">
                                    <span class="text-red-500 mr-1">*</span>访问方式
                                </label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white text-sm">
                                    <option value="">请选择访问方式</option>
                                    <option value="phone" selected>电话沟通</option>
                                    <option value="visit">上门拜访</option>
                                    <option value="online">线上会议</option>
                                    <option value="email">邮件沟通</option>
                                </select>
                            </div>

                            <div class="space-y-1.5">
                                <label class="block text-sm font-semibold text-gray-700">
                                    <span class="text-red-500 mr-1">*</span>重要程度
                                </label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white text-sm">
                                    <option value="">请选择重要程度</option>
                                    <option value="high" selected>高 - 战略客户</option>
                                    <option value="medium">中 - 重点跟进</option>
                                    <option value="low">低 - 常规维护</option>
                                </select>
                            </div>
                        </div>

                        <!-- 新客户分配区域 -->
                        <div id="newCustomerSection" class="border-2 border-orange-200 rounded-xl p-5 bg-orange-50/30 space-y-4">
                            <div class="flex items-center justify-between border-b border-orange-200 pb-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
                                        <i class="fas fa-user-plus"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-gray-800">新客户统一分配</h4>
                                        <p class="text-xs text-gray-500 mt-0.5">需手动指定营销负责人</p>
                                    </div>
                                </div>
                                <span class="bg-orange-500 text-white text-xs font-bold px-3 py-1 rounded-full" id="newBadge">4 条待分配</span>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    <span class="text-red-500 mr-1">*</span>分配营销人员
                                </label>
                                <div class="relative">
                                    <select id="marketerSelect" class="w-full px-3 py-2.5 border border-orange-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 bg-white text-sm">
                                        <option value="">请选择负责营销人员</option>
                                        <option value="zhangming" selected>张明 - 营销总监（分支机构）</option>
                                        <option value="lihua">李华 - 高级营销经理</option>
                                        <option value="wangtao">王涛 - 大客户部经理</option>
                                        <option value="zhaofang">赵芳 - 渠道拓展主管</option>
                                    </select>
                                    <div class="absolute right-8 top-2.5 text-orange-500 text-xs">
                                        <i class="fas fa-star mr-1"></i>必填
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 mt-1.5 flex items-center gap-1">
                                    <i class="fas fa-info-circle"></i>
                                    所选人员将成为 4 条新线索的默认跟进人
                                </p>
                            </div>
                        </div>

                        <!-- 已有客户提示区域 -->
                        <div class="border-2 border-green-200 rounded-xl p-5 bg-green-50/30">
                            <div class="flex items-start gap-3">
                                <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600 shrink-0 mt-1">
                                    <i class="fas fa-check-circle"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="font-bold text-gray-800">已有客户自动关联</h4>
                                        <span class="bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full" id="existingBadge">3 条自动分配</span>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-3">以下客户已存在于系统，跟进计划将自动分配给其主要跟进人：</p>
                                    <div class="flex flex-wrap gap-2" id="existingTags">
                                        <!-- 动态生成已有客户标签 -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 访问目的 -->
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>访问目的
                            </label>
                            <textarea rows="3" placeholder="请输入本次跟进的具体目的、预期成果及备注信息..." 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none text-sm">针对新能源项目需求进行初步沟通，了解客户具体装机容量要求及预算范围，安排技术团队进行现场勘查。</textarea>
                        </div>

                        <!-- 提醒设置 -->
                        <div class="grid grid-cols-2 gap-5 p-4 bg-gray-50 rounded-lg border border-gray-200">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-3">
                                    <span class="text-red-500 mr-1">*</span>是否设置提醒
                                </label>
                                <div class="flex gap-6">
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <input type="radio" name="remind" value="yes" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" onchange="toggleRemind(true)">
                                        <span class="text-gray-700 group-hover:text-blue-600 transition-colors">是，提前提醒</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <input type="radio" name="remind" value="no" checked class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" onchange="toggleRemind(false)">
                                        <span class="text-gray-700 group-hover:text-blue-600 transition-colors">否，不提醒</span>
                                    </label>
                                </div>
                            </div>
                            <div id="remindTimeBox" class="opacity-50 pointer-events-none transition-all duration-300">
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">
                                    <span class="text-red-500 mr-1">*</span>提醒时间
                                </label>
                                <div class="relative">
                                    <input type="datetime-local" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                                    <i class="fas fa-bell absolute right-3 top-2.5 text-gray-400"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 弹窗底部 -->
            <div class="px-8 py-4 border-t border-gray-200 bg-gray-50 flex justify-between items-center shrink-0">
                <div class="text-sm text-gray-500 flex items-center gap-2">
                    <i class="fas fa-shield-alt text-green-500"></i>
                    <span>提交后将同时为 <strong class="text-gray-900">7</strong> 条线索创建跟进计划，操作不可撤销</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.location.reload()" class="px-5 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-100 transition-all text-sm">
                        取消
                    </button>
                    <button onclick="submitForm()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-lg shadow-blue-200 hover:bg-blue-700 hover:shadow-xl transition-all flex items-center gap-2 text-sm">
                        <i class="fas fa-check-circle"></i>
                        确认批量创建
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 7条假数据（4条新客户，3条已有客户）
        let selectedClues = [
            {
                id: 1,
                name: "官网表单-新能源咨询-华润集团-20240115",
                batchNo: "LEAD-20240115-WEB-001",
                customer: "华润新能源集团有限公司",
                isNew: true,
                source: "官网咨询"
            },
            {
                id: 2,
                name: "上海新能源展会-储能设备需求-20240110",
                batchNo: "CL-20240110-EXPO-A01",
                customer: "华东智能制造控股有限公司",
                isNew: false,
                source: "展会获客",
                currentOwner: "李华"
            },
            {
                id: 3,
                name: "中建三局推荐-建筑光伏一体化项目-20240108",
                batchNo: "LEAD-20240112-PART-001",
                customer: "苏州精密仪器制造有限公司",
                isNew: true,
                source: "合作伙伴推荐"
            },
            {
                id: 4,
                name: "LinkedIn联系-德国工业集团-绿电采购-20240114",
                batchNo: "SOCIAL-20240114-LKD-002",
                customer: "东莞电子科技有限公司",
                isNew: false,
                source: "社交拓客",
                currentOwner: "王涛"
            },
            {
                id: 5,
                name: "苏州精密制造-厂房屋顶光伏改造-20240109",
                batchNo: "AD-20240113-BAIDU-001",
                customer: "上海金诚企业管理咨询有限公司",
                isNew: true,
                source: "广告投放"
            },
            {
                id: 6,
                name: "电话咨询-光伏电站EPC总承包-20240112",
                batchNo: "BATCH-240115-CALL-003",
                customer: "中建国际工程总承包有限公司",
                isNew: false,
                source: "热线咨询",
                currentOwner: "张明"
            },
            {
                id: 7,
                name: "雄安新区-零碳园区示范项目-20240113",
                batchNo: "EVENT-20240108-SEMINAR-001",
                customer: "杭州云智数字科技有限公司",
                isNew: true,
                source: "行业研讨会"
            }
        ];

        // 渲染左侧列表
        function renderList() {
            const container = document.getElementById('clueList');
            const newCount = selectedClues.filter(c => c.isNew).length;
            const existingCount = selectedClues.filter(c => !c.isNew).length;
            
            // 更新统计
            document.getElementById('newCount').textContent = newCount;
            document.getElementById('existingCount').textContent = existingCount;
            document.getElementById('newBadge').textContent = `${newCount} 条待分配`;
            document.getElementById('existingBadge').textContent = `${existingCount} 条自动分配`;
            document.getElementById('totalCount').textContent = `${selectedClues.length}条`;
            document.getElementById('headerCount').textContent = selectedClues.length;
            
            // 渲染列表
            container.innerHTML = selectedClues.map(clue => `
                <div class="bg-white rounded-lg border-l-4 ${clue.isNew ? 'border-orange-400' : 'border-green-400'} p-3 shadow-sm hover:shadow-md transition-all group relative border border-gray-100">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-bold px-2 py-0.5 rounded ${clue.isNew ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'}">
                            ${clue.isNew ? '新客户' : '已有客户'}
                        </span>
                        <button onclick="removeClue(${clue.id})" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <h4 class="text-sm font-semibold text-gray-900 mb-1 line-clamp-2 leading-tight">${clue.name}</h4>
                    <p class="text-xs text-gray-500 mb-2 truncate">${clue.customer}</p>
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-gray-400 bg-gray-50 px-2 py-0.5 rounded">${clue.source}</span>
                        ${!clue.isNew ? `<span class="text-green-600 font-medium"><i class="fas fa-user-check mr-1"></i>${clue.currentOwner}</span>` : ''}
                    </div>
                </div>
            `).join('');
            
            // 渲染已有客户标签（右侧）
            const existingClues = selectedClues.filter(c => !c.isNew);
            const tagsContainer = document.getElementById('existingTags');
            tagsContainer.innerHTML = existingClues.map(c => `
                <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs bg-white border border-green-200 text-green-700 shadow-sm">
                    <i class="fas fa-building text-green-500"></i>
                    <span class="font-medium truncate max-w-[150px]">${c.customer}</span>
                    <span class="text-green-400">|</span>
                    <span class="text-gray-500">原跟进人: ${c.currentOwner}</span>
                </div>
            `).join('');
            
            // 控制新客户区域显示状态
            const newSection = document.getElementById('newCustomerSection');
            if (newCount === 0) {
                newSection.style.opacity = '0.5';
                newSection.style.pointerEvents = 'none';
            } else {
                newSection.style.opacity = '1';
                newSection.style.pointerEvents = 'auto';
            }
            
            // 控制已有客户区域显示状态
            const existingSection = document.querySelector('.border-green-200').parentElement;
            if (existingCount === 0) {
                existingSection.style.display = 'none';
            } else {
                existingSection.style.display = 'block';
            }
        }

        // 移除单条线索
        function removeClue(id) {
            selectedClues = selectedClues.filter(c => c.id !== id);
            if (selectedClues.length === 0) {
                alert('至少需要保留一条线索');
                window.location.reload();
                return;
            }
            renderList();
        }

        // 切换提醒设置
        function toggleRemind(show) {
            const box = document.getElementById('remindTimeBox');
            if (show) {
                box.classList.remove('opacity-50', 'pointer-events-none');
                // 设置默认提醒时间（明天同一时间）
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setMinutes(tomorrow.getMinutes() - tomorrow.getTimezoneOffset());
                const dateStr = tomorrow.toISOString().slice(0, 16);
                box.querySelector('input').value = dateStr;
            } else {
                box.classList.add('opacity-50', 'pointer-events-none');
                box.querySelector('input').value = '';
            }
        }

        // 提交表单
        function submitForm() {
            const newCount = selectedClues.filter(c => c.isNew).length;
            const marketer = document.getElementById('marketerSelect').value;
            
            // 验证：如果有新客户，必须选择营销人员
            if (newCount > 0 && !marketer) {
                alert('请为新客户选择分配营销人员');
                document.getElementById('marketerSelect').focus();
                document.getElementById('marketerSelect').classList.add('ring-2', 'ring-red-500');
                setTimeout(() => {
                    document.getElementById('marketerSelect').classList.remove('ring-2', 'ring-red-500');
                }, 2000);
                return;
            }
            
            // 模拟提交
            const btn = event.target;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 创建中...';
            btn.disabled = true;
            
            setTimeout(() => {
                const existingCount = selectedClues.filter(c => !c.isNew).length;
                alert(`✅ 批量创建成功！\n\n📊 创建概况：\n• 新客户：${newCount} 条（已分配给：${marketer ? document.getElementById('marketerSelect').options[document.getElementById('marketerSelect').selectedIndex].text : '无'}）\n• 已有客户：${existingCount} 条（自动关联原跟进人）\n\n跟进计划已生成，请及时查看。`);
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }, 1200);
        }

        // 初始化
        renderList();
    </script>
</body>
</html>
