<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加客户</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f3f4f6; }
        .form-input { transition: all 0.2s; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .required-label::after { content: ' *'; color: #ef4444; font-weight: 600; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        
        /* 自动填充高亮样式 */
        .auto-filled {
            background-color: #eff6ff !important;
            border-color: #3b82f6 !important;
            color: #1e40af !important;
        }
        
        /* 状态标签 */
        .status-tag {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tag-existing { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .tag-new { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .tag-checking { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        
        /* 字段分组标题 */
        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        /* 加载动画 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-icon {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- 固定宽高弹窗：900px × 650px -->
    <div class="w-[900px] h-[650px] bg-white rounded-xl shadow-2xl flex flex-col overflow-hidden border border-gray-200">
        
        <!-- 头部 -->
        <div class="h-14 border-b border-gray-200 flex items-center justify-between px-6 bg-gradient-to-r from-blue-50 to-white shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-sm">
                    <i class="fas fa-user-plus text-sm"></i>
                </div>
                <div>
                    <h2 class="text-base font-semibold text-gray-900">添加客户</h2>
                    <p class="text-xs text-gray-500">证件号123456默认关联老客户数据</p>
                </div>
            </div>
            <button class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- 内容区 -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 bg-white">
            <form class="space-y-5" id="customerForm">
                
                <!-- 步骤1：客户类型与证件信息（调整顺序） -->
                <div>
                    <div class="section-title flex items-center gap-2">
                        <span class="w-5 h-5 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">1</span>
                        客户身份验证
                    </div>
                    
                    <div class="grid grid-cols-2 gap-5 mb-4">
                        <!-- 客户类型（第一步） -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">客户类型</label>
                            <div class="relative">
                                <select id="customerType" onchange="onCustomerTypeChange()" 
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white cursor-pointer">
                                    <option value="">请选择客户类型</option>
                                    <option value="enterprise">民营企业</option>
                                    <option value="state">国有企业</option>
                                    <option value="foreign">外资企业</option>
                                    <option value="individual">个体工商户</option>
                                    <option value="personal">个人客户</option>
                                    <option value="government">政府机构</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                            <p class="text-xs text-gray-500 mt-1.5">选择后将自动匹配证件类型</p>
                        </div>
                        
                        <!-- 证件代码类型（联动） -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">证件代码类型</label>
                            <div class="relative">
                                <select id="idType" onchange="onIdTypeChange()" disabled
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-gray-50 text-gray-400 cursor-not-allowed disabled:opacity-60">
                                    <option value="">请先选择客户类型</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                            <p class="text-xs text-blue-600 mt-1.5 hidden" id="idTypeHint">
                                <i class="fas fa-info-circle mr-1"></i>
                                已根据客户类型自动匹配
                            </p>
                        </div>
                    </div>

                    <!-- 第二行：证件号码 + 企业名称（企业名称在证件号码后） -->
                    <div class="grid grid-cols-2 gap-5">
                        <!-- 证件号码（先输入） -->
                        <div class="relative">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">证件号码</label>
                            <div class="relative">
                                <input type="text" id="idNumber" onblur="queryCustomerCenter()" disabled
                                    class="form-input w-full h-[40px] pl-3 pr-28 text-sm border border-gray-300 rounded-lg focus:outline-none font-mono disabled:bg-gray-50 disabled:text-gray-400 disabled:cursor-not-allowed" 
                                    placeholder="请输入证件号码，123456为老客户">
                                
                                <!-- 状态标签容器 -->
                                <div id="statusTag" class="status-tag hidden">
                                    <i class="fas fa-check-circle"></i>
                                    <span>已存在</span>
                                </div>
                            </div>
                            <p class="text-xs text-gray-500 mt-1.5" id="idHint">输入后自动查询客户中心（测试用：123456）</p>
                        </div>
                        
                        <!-- 客户名称/企业名称（后显示，可自动填充） -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">企业名称</label>
                            <div class="relative">
                                <input type="text" id="customerName" 
                                    class="form-input w-full h-[40px] px-3 text-sm border border-gray-300 rounded-lg focus:outline-none" 
                                    placeholder="请先输入证件号查询，或手动输入"
                                    maxlength="100">
                            </div>
                            <p class="text-xs text-gray-400 mt-1.5" id="nameHint">老客户将自动填充，新客户请手动输入</p>
                        </div>
                    </div>
                </div>

                <!-- 步骤2：业务信息 -->
                <div>
                    <div class="section-title flex items-center gap-2">
                        <span class="w-5 h-5 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">2</span>
                        业务信息
                        <span class="text-xs font-normal text-gray-400 normal-case ml-2" id="fillHint">（老客户数据已自动填充，可修改）</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-5 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">行业分类</label>
                            <div class="relative">
                                <select id="industry" 
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white">
                                    <option value="">请选择</option>
                                    <option value="energy">能源电力产业</option>
                                    <option value="newenergy">新能源产业</option>
                                    <option value="pv">光伏产业</option>
                                    <option value="hydrogen">氢能产业</option>
                                    <option value="medical">医学健康产业</option>
                                    <option value="pharma">生物制药产业</option>
                                    <option value="radiation">电离辐射/核产业</option>
                                    <option value="traffic">交通建筑产业</option>
                                    <option value="petro">石油化工产业</option>
                                    <option value="aviation">民航航空产业</option>
                                    <option value="tic">TIC技术服务产业</option>
                                    <option value="manufacturing">制造业</option>
                                    <option value="other">其他产业</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">客户来源</label>
                            <div class="relative">
                                <select id="source" 
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white">
                                    <option value="">请选择</option>
                                    <option value="online">线上</option>
                                    <option value="offline">线下</option>
                                    <option value="referral">转介绍</option>
                                    <option value="bid">招投标</option>
                                    <option value="exhibition">展会</option>
                                    <option value="phone">电话咨询</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">服务等级</label>
                            <div class="relative">
                                <select id="serviceLevel" 
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white">
                                    <option value="C" selected>C级</option>
                                    <option value="B">B级</option>
                                    <option value="A">A级</option>
                                    <option value="S">S级</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">客户等级</label>
                            <div class="relative">
                                <select id="customerLevel" 
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white">
                                    <option value="">请选择星级</option>
                                    <option value="1">★ (1星)</option>
                                    <option value="2">★★ (2星)</option>
                                    <option value="3">★★★ (3星)</option>
                                    <option value="4">★★★★ (4星)</option>
                                    <option value="5">★★★★★ (5星)</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">人员规模</label>
                            <div class="relative">
                                <select id="staffSize" 
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white">
                                    <option value="">请选择</option>
                                    <option value="1-50">1-50人</option>
                                    <option value="50-100">50-100人</option>
                                    <option value="100-500">100-500人</option>
                                    <option value="500-1000">500-1000人</option>
                                    <option value="1000+">1000人以上</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">经营开始</label>
                                <input type="date" id="startDate"
                                    class="form-input w-full h-[40px] px-2 text-sm border border-gray-300 rounded-lg focus:outline-none text-gray-600">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">经营截止</label>
                                <input type="date" id="endDate"
                                    class="form-input w-full h-[40px] px-2 text-sm border border-gray-300 rounded-lg focus:outline-none text-gray-600">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 步骤3：地址信息 -->
                <div>
                    <div class="section-title flex items-center gap-2">
                        <span class="w-5 h-5 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">3</span>
                        地址信息
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">地址</label>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="relative">
                                <select id="province" onchange="onProvinceChange()"
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-white">
                                    <option value="">省/直辖市</option>
                                    <option value="guangdong">广东省</option>
                                    <option value="beijing">北京市</option>
                                    <option value="shanghai">上海市</option>
                                    <option value="jiangsu">江苏省</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                            <div class="relative">
                                <select id="city" onchange="onCityChange()" disabled
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-gray-50 text-gray-400 disabled:opacity-60">
                                    <option value="">市</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                            <div class="relative">
                                <select id="district" disabled
                                    class="form-input w-full h-[40px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:outline-none appearance-none bg-gray-50 text-gray-400 disabled:opacity-60">
                                    <option value="">区/县</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5 required-label">详细地址</label>
                        <input type="text" id="address" 
                            class="form-input w-full h-[40px] px-3 text-sm border border-gray-300 rounded-lg focus:outline-none" 
                            placeholder="请输入详细街道地址，用于精准定位和配送">
                    </div>
                </div>

                <!-- 状态提示区 -->
                <div id="queryResult" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3 flex items-start gap-2">
                    <i class="fas fa-info-circle text-blue-500 mt-0.5 text-sm"></i>
                    <div class="text-xs text-blue-700 leading-relaxed">
                        <p class="font-medium mb-0.5" id="resultTitle">查询结果</p>
                        <p id="resultDesc">正在查询客户中心...</p>
                    </div>
                </div>

            </form>
        </div>

        <!-- 底部按钮 -->
        <div class="h-16 border-t border-gray-200 px-6 flex items-center justify-between bg-gray-50 shrink-0">
            <div class="flex items-center gap-4 text-xs text-gray-500">
                <span class="flex items-center gap-1">
                    <i class="fas fa-shield-alt text-gray-400"></i>
                    提交后将校验唯一性
                </span>
                <span id="syncHint" class="hidden text-blue-600">
                    <i class="fas fa-sync-alt mr-1"></i>
                    新客户将自动同步
                </span>
            </div>
            <div class="flex gap-3">
                <button type="button" class="px-5 h-9 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-all">
                    取消
                </button>
                <button type="submit" onclick="submitForm()" class="px-5 h-9 border border-transparent rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-all flex items-center gap-2">
                    <i class="fas fa-save text-xs"></i>
                    提交
                </button>
            </div>
        </div>
    </div>

    <script>
        // 客户类型与证件类型映射规则
        const idTypeRules = {
            'enterprise': [
                { value: 'unified', label: '统一社会信用代码' },
                { value: 'business', label: '营业执照' },
                { value: 'org', label: '组织机构代码证' }
            ],
            'state': [
                { value: 'unified', label: '统一社会信用代码' },
                { value: 'org', label: '组织机构代码证' }
            ],
            'foreign': [
                { value: 'unified', label: '统一社会信用代码' },
                { value: 'business', label: '营业执照(外商投资)' },
                { value: 'reg', label: '外商投资企业批准证书' }
            ],
            'individual': [
                { value: 'unified', label: '统一社会信用代码(个体)' },
                { value: 'business', label: '个体工商户营业执照' }
            ],
            'personal': [
                { value: 'idcard', label: '居民身份证' },
                { value: 'passport', label: '护照' },
                { value: 'hkid', label: '港澳居民来往内地通行证' }
            ],
            'government': [
                { value: 'unified', label: '统一社会信用代码' },
                { value: 'org', label: '组织机构代码证' }
            ]
        };

        // 城市数据
        const cityData = {
            'guangdong': [
                { value: 'shenzhen', label: '深圳市', districts: ['南山区', '福田区', '罗湖区', '宝安区'] },
                { value: 'guangzhou', label: '广州市', districts: ['天河区', '越秀区', '海珠区'] }
            ],
            'beijing': [
                { value: 'beijing', label: '北京市', districts: ['朝阳区', '海淀区', '东城区', '西城区'] }
            ],
            'shanghai': [
                { value: 'shanghai', label: '上海市', districts: ['浦东新区', '黄浦区', '静安区'] }
            ],
            'jiangsu': [
                { value: 'nanjing', label: '南京市', districts: ['鼓楼区', '玄武区'] },
                { value: 'suzhou', label: '苏州市', districts: ['工业园区', '姑苏区'] }
            ]
        };

        let isExistingCustomer = false;

        // 客户类型变更 - 联动证件类型
        function onCustomerTypeChange() {
            const customerType = document.getElementById('customerType').value;
            const idTypeSelect = document.getElementById('idType');
            const idNumber = document.getElementById('idNumber');
            const hint = document.getElementById('idTypeHint');
            
            if (!customerType) {
                idTypeSelect.innerHTML = '<option value="">请先选择客户类型</option>';
                idTypeSelect.disabled = true;
                idTypeSelect.classList.add('bg-gray-50', 'text-gray-400', 'cursor-not-allowed');
                idTypeSelect.classList.remove('bg-white', 'text-gray-900');
                idNumber.disabled = true;
                hint.classList.add('hidden');
                return;
            }
            
            idTypeSelect.disabled = false;
            idTypeSelect.classList.remove('bg-gray-50', 'text-gray-400', 'cursor-not-allowed');
            idTypeSelect.classList.add('bg-white', 'text-gray-900');
            
            const options = idTypeRules[customerType] || [];
            idTypeSelect.innerHTML = '<option value="">请选择证件类型</option>' +
                options.map(opt => `<option value="${opt.value}">${opt.label}</option>`).join('');
            
            hint.classList.remove('hidden');
            resetQueryStatus();
        }

        // 证件类型变更
        function onIdTypeChange() {
            const idType = document.getElementById('idType').value;
            const idNumber = document.getElementById('idNumber');
            
            if (idType) {
                idNumber.disabled = false;
                idNumber.classList.remove('bg-gray-50', 'text-gray-400');
                idNumber.classList.add('bg-white', 'text-gray-900');
                idNumber.focus();
            } else {
                idNumber.disabled = true;
            }
        }

        // 查询客户中心（证件号码失去焦点时触发）
        function queryCustomerCenter() {
            const idNumber = document.getElementById('idNumber').value.trim();
            const customerType = document.getElementById('customerType').value;
            const statusTag = document.getElementById('statusTag');
            const queryResult = document.getElementById('queryResult');
            const resultTitle = document.getElementById('resultTitle');
            const resultDesc = document.getElementById('resultDesc');
            const syncHint = document.getElementById('syncHint');
            const nameHint = document.getElementById('nameHint');
            
            if (!idNumber || !customerType) return;
            
            // 显示查询中状态
            statusTag.classList.remove('hidden', 'tag-existing', 'tag-new');
            statusTag.classList.add('tag-checking');
            statusTag.innerHTML = '<i class="fas fa-circle-notch loading-icon"></i><span>查询中...</span>';
            
            queryResult.classList.remove('hidden');
            resultTitle.textContent = '正在查询客户中心...';
            resultDesc.textContent = '系统正在验证客户是否存在，请稍候...';
            
            // 模拟异步查询
            setTimeout(() => {
                // 证件号为"123456"时默认是老客户
                if (idNumber === '123456') {
                    isExistingCustomer = true;
                    statusTag.classList.remove('tag-checking');
                    statusTag.classList.add('tag-existing');
                    statusTag.innerHTML = '<i class="fas fa-check-circle"></i><span>老客户已关联</span>';
                    
                    resultTitle.textContent = '已关联老客户数据（证件号：123456）';
                    resultDesc.innerHTML = '客户中心已存在该客户，企业名称及信息已自动填充（<span class="font-semibold text-blue-700">蓝色高亮</span>字段为自动带入，支持修改）';
                    syncHint.classList.add('hidden');
                    nameHint.textContent = '老客户企业名称已自动填充';
                    
                    // 自动填充假数据
                    autoFillExistingData();
                } else {
                    // 新客户
                    isExistingCustomer = false;
                    statusTag.classList.remove('tag-checking');
                    statusTag.classList.add('tag-new');
                    statusTag.innerHTML = '<i class="fas fa-exclamation-circle"></i><span>新客户</span>';
                    
                    resultTitle.textContent = '未查询到该客户';
                    resultDesc.textContent = '该证件号码在客户中心无记录，提交后将创建新客户并自动同步';
                    syncHint.classList.remove('hidden');
                    nameHint.textContent = '新客户请手动输入企业名称';
                    
                    clearAutoFillStyle();
                    // 清空企业名称，让用户手动输入
                    document.getElementById('customerName').value = '';
                    document.getElementById('customerName').placeholder = '请输入企业名称';
                }
            }, 600);
        }

        // 自动填充老客户假数据
        function autoFillExistingData() {
            const fields = {
                'customerName': '华润新能源集团有限公司',
                'industry': 'newenergy',
                'source': 'offline',
                'serviceLevel': 'A',
                'customerLevel': '5',
                'staffSize': '1000+',
                'startDate': '2010-06-18',
                'province': 'guangdong',
                'address': '深圳市南山区科技园南区华润置地大厦15层'
            };
            
            // 填充并高亮
            Object.keys(fields).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.value = fields[key];
                    el.classList.add('auto-filled');
                    setTimeout(() => {
                        el.classList.remove('auto-filled');
                    }, 2500);
                }
            });
            
            // 触发省市区联动
            onProvinceChange();
            setTimeout(() => {
                document.getElementById('city').value = 'shenzhen';
                onCityChange();
                setTimeout(() => {
                    document.getElementById('district').value = '南山区';
                }, 50);
            }, 50);
        }

        // 清除自动填充样式
        function clearAutoFillStyle() {
            document.querySelectorAll('.auto-filled').forEach(el => {
                el.classList.remove('auto-filled');
            });
        }

        // 重置查询状态
        function resetQueryStatus() {
            const statusTag = document.getElementById('statusTag');
            const queryResult = document.getElementById('queryResult');
            const syncHint = document.getElementById('syncHint');
            
            statusTag.classList.add('hidden');
            queryResult.classList.add('hidden');
            syncHint.classList.add('hidden');
            isExistingCustomer = false;
            clearAutoFillStyle();
        }

        // 省份变更联动城市
        function onProvinceChange() {
            const province = document.getElementById('province').value;
            const citySelect = document.getElementById('city');
            const districtSelect = document.getElementById('district');
            
            if (!province) {
                citySelect.innerHTML = '<option value="">市</option>';
                citySelect.disabled = true;
                districtSelect.innerHTML = '<option value="">区/县</option>';
                districtSelect.disabled = true;
                return;
            }
            
            const cities = cityData[province] || [];
            citySelect.innerHTML = '<option value="">请选择市</option>' +
                cities.map(c => `<option value="${c.value}">${c.label}</option>`).join('');
            citySelect.disabled = false;
            citySelect.classList.remove('bg-gray-50', 'text-gray-400');
            citySelect.classList.add('bg-white', 'text-gray-900');
            
            districtSelect.innerHTML = '<option value="">区/县</option>';
            districtSelect.disabled = true;
        }

        // 城市变更联动区县
        function onCityChange() {
            const province = document.getElementById('province').value;
            const city = document.getElementById('city').value;
            const districtSelect = document.getElementById('district');
            
            if (!city) {
                districtSelect.innerHTML = '<option value="">区/县</option>';
                districtSelect.disabled = true;
                return;
            }
            
            const cityInfo = cityData[province].find(c => c.value === city);
            if (cityInfo) {
                districtSelect.innerHTML = '<option value="">请选择区/县</option>' +
                    cityInfo.districts.map(d => `<option value="${d}">${d}</option>`).join('');
                districtSelect.disabled = false;
                districtSelect.classList.remove('bg-gray-50', 'text-gray-400');
                districtSelect.classList.add('bg-white', 'text-gray-900');
            }
        }

        // 提交表单
        function submitForm() {
            const requiredFields = ['customerType', 'idType', 'idNumber', 'customerName', 'industry', 'source', 'startDate', 'address'];
            let isValid = true;
            let firstError = null;
            
            requiredFields.forEach(field => {
                const el = document.getElementById(field);
                if (!el.value.trim()) {
                    el.classList.add('border-red-500');
                    isValid = false;
                    if (!firstError) firstError = el;
                } else {
                    el.classList.remove('border-red-500');
                }
            });
            
            if (!isValid) {
                firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => alert('请填写所有必填项（标红*号）'), 100);
                return;
            }
            
            const action = isExistingCustomer ? '更新关联客户' : '创建新客户并同步';
            const customerName = document.getElementById('customerName').value;
            
            alert(`校验通过！\n\n客户名称：${customerName}\n证件号码：${document.getElementById('idNumber').value}\n操作类型：${action}\n\n${isExistingCustomer ? '• 客户状态：已存在（关联成功）' : '• 客户状态：待提交\n• 同步状态：待同步'}\n\n确认提交吗？`);
        }

        // 监听所有输入框移除错误样式
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', function() {
                this.classList.remove('border-red-500');
            });
        });
    </script>
</body>
</html>
