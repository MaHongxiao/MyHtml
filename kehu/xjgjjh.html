<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建跟进计划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        
        /* 固定尺寸弹窗 */
        .modal-fixed {
            width: 1152px;
            height: 892px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar { 
            width: 8px; 
        }
        .custom-scrollbar::-webkit-scrollbar-track { 
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 4px; 
            border: 2px solid #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { 
            background: #94a3b8; 
        }

        /* 表单元素聚焦效果 */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

    <!-- 固定尺寸弹窗：1152px × 892px -->
    <div class="modal-fixed">
        
        <!-- 头部：高度约72px -->
        <div class="h-[72px] border-b border-gray-200 flex items-center justify-between px-8 bg-white shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-clipboard-check text-lg"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-900 tracking-tight">创建跟进计划</h2>
                    <p class="text-sm text-gray-500">为线索制定详细的跟进策略与时间安排</p>
                </div>
            </div>
            <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- 内容区：高度约740px (892-72-80) -->
        <div class="flex-1 overflow-y-auto custom-scrollbar bg-gray-50/50 p-8">
            <form class="space-y-6 max-w-[1088px] mx-auto">
                
                <!-- 基础信息（只读） -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">
                            <span class="text-red-500 mr-1">*</span>客户名称
                            <span class="text-xs font-normal text-gray-400 ml-2">系统自动关联</span>
                        </label>
                        <div class="relative">
                            <input type="text" readonly value="华润新能源集团有限公司" 
                                class="w-full h-11 pl-10 pr-4 bg-gray-100 border border-gray-200 rounded-lg text-gray-700 font-medium cursor-not-allowed">
                            <i class="fas fa-building absolute left-3.5 top-3.5 text-gray-400"></i>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">
                            <span class="text-red-500 mr-1">*</span>关联线索
                        </label>
                        <div class="relative">
                            <input type="text" readonly value="官网表单-新能源咨询-华润集团-20240115" 
                                class="w-full h-11 pl-10 pr-4 bg-gray-100 border border-gray-200 rounded-lg text-gray-700 font-medium cursor-not-allowed text-sm">
                            <i class="fas fa-link absolute left-3.5 top-3.5 text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <!-- 主要配置卡片 -->
                <div class="bg-white rounded-xl p-6 border border-gray-200 shadow-sm space-y-6">
                    <div class="flex items-center gap-2 pb-2 border-b border-gray-100">
                        <div class="w-1 h-5 bg-blue-500 rounded-full"></div>
                        <h3 class="font-bold text-gray-900 text-lg">计划配置</h3>
                    </div>

                    <div class="grid grid-cols-2 gap-x-6 gap-y-5">
                        <!-- 联系人 -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>联系人
                            </label>
                            <div class="relative">
                                <select class="w-full h-11 pl-10 pr-10 bg-white border border-gray-300 rounded-lg appearance-none text-sm">
                                    <option value="">请选择联系人</option>
                                    <option value="1">张经理 (采购部)</option>
                                    <option value="2">李总 (总经理)</option>
                                    <option value="3">王工 (技术部)</option>
                                </select>
                                <i class="fas fa-user absolute left-3.5 top-3.5 text-gray-400"></i>
                                <i class="fas fa-chevron-down absolute right-3.5 top-3.5 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <!-- 计划联系日期 -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>计划联系日期
                            </label>
                            <div class="relative">
                                <input type="datetime-local" 
                                    class="w-full h-11 pl-10 pr-4 bg-white border border-gray-300 rounded-lg text-sm">
                                <i class="fas fa-calendar-alt absolute left-3.5 top-3.5 text-gray-400"></i>
                            </div>
                        </div>

                        <!-- 计划截止日期 -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>计划截止日期
                            </label>
                            <div class="relative">
                                <input type="datetime-local" 
                                    class="w-full h-11 pl-10 pr-4 bg-white border border-gray-300 rounded-lg text-sm">
                                <i class="fas fa-calendar-check absolute left-3.5 top-3.5 text-gray-400"></i>
                            </div>
                        </div>

                        <!-- 访问方式 -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>访问方式
                            </label>
                            <div class="relative">
                                <select class="w-full h-11 pl-10 pr-10 bg-white border border-gray-300 rounded-lg appearance-none text-sm">
                                    <option value="">请选择访问方式</option>
                                    <option value="phone">电话沟通</option>
                                    <option value="visit" selected>上门拜访</option>
                                    <option value="online">视频会议</option>
                                    <option value="email">邮件往来</option>
                                </select>
                                <i class="fas fa-walking absolute left-3.5 top-3.5 text-gray-400"></i>
                                <i class="fas fa-chevron-down absolute right-3.5 top-3.5 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <!-- 跟进人 -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>跟进人
                            </label>
                            <div class="relative">
                                <select class="w-full h-11 pl-10 pr-10 bg-white border border-gray-300 rounded-lg appearance-none text-sm">
                                    <option value="">请选择跟进人</option>
                                    <option value="zhangming" selected>张明 (营销总监)</option>
                                    <option value="lihua">李华 (高级经理)</option>
                                    <option value="wangtao">王涛 (客户经理)</option>
                                </select>
                                <i class="fas fa-user-tie absolute left-3.5 top-3.5 text-gray-400"></i>
                                <i class="fas fa-chevron-down absolute right-3.5 top-3.5 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <!-- 重要程度 -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>重要程度
                            </label>
                            <div class="relative">
                                <select class="w-full h-11 pl-10 pr-10 bg-white border border-gray-300 rounded-lg appearance-none text-sm">
                                    <option value="">请选择重要程度</option>
                                    <option value="high">🔴 高 - 战略客户</option>
                                    <option value="medium" selected>🟡 中 - 重点跟进</option>
                                    <option value="low">🟢 低 - 常规维护</option>
                                </select>
                                <i class="fas fa-flag absolute left-3.5 top-3.5 text-gray-400"></i>
                                <i class="fas fa-chevron-down absolute right-3.5 top-3.5 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <!-- 访问目的 - 占满两列 -->
                        <div class="col-span-2 space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>访问目的
                            </label>
                            <div class="relative">
                                <textarea rows="4" placeholder="请详细描述本次跟进的具体目标、需要了解的信息以及预期达成的结果..." 
                                    class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg resize-none text-sm leading-relaxed"></textarea>
                                <div class="absolute bottom-3 right-3 text-xs text-gray-400 bg-white px-1">0/500</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 提醒设置 -->
                <div class="bg-blue-50/50 rounded-xl p-6 border border-blue-100">
                    <div class="grid grid-cols-2 gap-6 items-end">
                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>是否提醒
                            </label>
                            <div class="flex gap-8">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="remind" value="yes" onchange="toggleRemind(true)" 
                                        class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">是，提前提醒</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="remind" value="no" checked onchange="toggleRemind(false)" 
                                        class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">否，暂不提醒</span>
                                </label>
                            </div>
                        </div>

                        <div id="remindTimeBox" class="space-y-2 opacity-50 pointer-events-none transition-all">
                            <label class="block text-sm font-semibold text-gray-700">
                                <span class="text-red-500 mr-1">*</span>设置提醒时间
                            </label>
                            <div class="relative">
                                <input type="datetime-local" id="remindTimeInput" disabled
                                    class="w-full h-11 pl-10 pr-4 bg-white border border-gray-300 rounded-lg text-sm">
                                <i class="fas fa-bell absolute left-3.5 top-3.5 text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 额外信息区域（填充高度） -->
                <div class="bg-gray-50 rounded-xl p-6 border border-gray-200 border-dashed">
                    <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                        <i class="fas fa-paperclip text-gray-400"></i>
                        附件资料（可选）
                    </h4>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-400 hover:bg-blue-50/30 transition-colors cursor-pointer group">
                        <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 group-hover:text-blue-400 mb-2 transition-colors"></i>
                        <p class="text-sm text-gray-500 group-hover:text-blue-600">点击上传或拖拽文件至此处</p>
                        <p class="text-xs text-gray-400 mt-1">支持 PDF、Word、Excel、图片格式，单个文件不超过 20MB</p>
                    </div>
                </div>

            </form>
        </div>

        <!-- 底部：高度约80px -->
        <div class="h-[80px] border-t border-gray-200 bg-white px-8 flex items-center justify-between shrink-0">
            <div class="text-sm text-gray-500 flex items-center gap-2">
                <i class="fas fa-info-circle text-blue-500"></i>
                <span>创建后可在跟进记录中查看执行情况</span>
            </div>
            <div class="flex gap-3">
                <button class="px-6 h-10 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 hover:border-gray-400 transition-all text-sm">
                    取消
                </button>
                <button class="px-6 h-10 bg-blue-600 text-white rounded-lg font-medium shadow-md shadow-blue-200 hover:bg-blue-700 hover:shadow-lg transition-all text-sm flex items-center gap-2">
                    <i class="fas fa-check text-sm"></i>
                    确认创建
                </button>
            </div>
        </div>
    </div>

    <script>
        // 切换提醒时间
        function toggleRemind(enabled) {
            const box = document.getElementById('remindTimeBox');
            const input = document.getElementById('remindTimeInput');
            
            if (enabled) {
                box.classList.remove('opacity-50', 'pointer-events-none');
                input.disabled = false;
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setMinutes(tomorrow.getMinutes() - tomorrow.getTimezoneOffset());
                input.value = tomorrow.toISOString().slice(0, 16);
            } else {
                box.classList.add('opacity-50', 'pointer-events-none');
                input.disabled = true;
                input.value = '';
            }
        }

        // 初始化默认日期
        document.addEventListener('DOMContentLoaded', () => {
            const dateInputs = document.querySelectorAll('input[type="datetime-local"]:not(#remindTimeInput)');
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(9, 0, 0, 0);
            tomorrow.setMinutes(tomorrow.getMinutes() - tomorrow.getTimezoneOffset());
            
            dateInputs.forEach((input, index) => {
                if (index === 0) {
                    input.value = tomorrow.toISOString().slice(0, 16);
                } else if (index === 1) {
                    const dayAfter = new Date(tomorrow);
                    dayAfter.setDate(dayAfter.getDate() + 1);
                    input.value = dayAfter.toISOString().slice(0, 16);
                }
            });
        });
    </script>
</body>
</html>
