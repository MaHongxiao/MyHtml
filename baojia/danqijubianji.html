<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑样品</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .form-input {
            transition: all 0.2s;
        }
        
        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }
        
        .required::after {
            content: ' *';
            color: #ef4444;
            font-weight: 600;
        }
        
        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
        
        /* 输入框禁用状态 */
        .input-disabled {
            background-color: #f9fafb;
            color: #6b7280;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- 固定宽高弹窗：1000px × 650px -->
    <div class="w-[1000px] h-[650px] bg-white rounded-xl shadow-2xl flex flex-col overflow-hidden border border-gray-200">
        
        <!-- 头部 -->
        <div class="h-14 border-b border-gray-200 flex items-center justify-between px-6 bg-gradient-to-r from-gray-50 to-white shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                    <i class="fas fa-edit text-sm"></i>
                </div>
                <h2 class="text-base font-semibold text-gray-900">编辑样品</h2>
                <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">智能压力变送器</span>
            </div>
            <button class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- 内容区 -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 bg-white">
            <form class="space-y-5">
                
                <!-- 第一组：器具基本信息 -->
                <div class="bg-gray-50/50 rounded-lg p-4 border border-gray-100">
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <i class="fas fa-cube text-gray-400"></i>
                        器具基本信息
                    </div>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="form-label required">器具名称</label>
                            <div class="relative">
                                <input type="text" class="form-input w-full h-[38px] pl-9 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none" value="智能压力变送器">
                                <i class="fas fa-tag absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">实际器具名称</label>
                            <input type="text" class="form-input w-full h-[38px] px-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none" placeholder="请输入实际器具名称">
                        </div>
                        <div>
                            <label class="form-label">测量范围</label>
                            <div class="relative">
                                <input type="text" class="form-input w-full h-[38px] pl-9 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none bg-gray-50" value="压力量程 0-1.6MPa" readonly>
                                <i class="fas fa-ruler absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">分包方式</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>不分包</option>
                                    <option>内包</option>
                                    <option>外包</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 第二组：报价信息 -->
                <div class="bg-gray-50/50 rounded-lg p-4 border border-gray-100">
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <i class="fas fa-coins text-gray-400"></i>
                        报价信息
                    </div>
                    <div class="grid grid-cols-6 gap-4">
                        <div class="col-span-2">
                            <label class="form-label required">内包区域/外包供应商</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>-</option>
                                    <option>中检计量XXXX公司</option>
                                    <option>广电计量公司</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">基准价</label>
                            <div class="relative">
                                <input type="number" class="form-input w-full h-[38px] pl-7 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-right" value="1200">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">¥</span>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">指导价</label>
                            <div class="relative">
                                <input type="number" class="form-input w-full h-[38px] pl-7 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-right" value="1284.00" step="0.01">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">¥</span>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">折扣率(%)</label>
                            <div class="relative">
                                <input type="number" class="form-input w-full h-[38px] pl-3 pr-7 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-right" value="100">
                                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">%</span>
                            </div>
                        </div>
                        <div>
                            <label class="form-label">实际报价</label>
                            <div class="relative">
                                <input type="text" class="form-input w-full h-[38px] pl-7 pr-3 text-sm border border-gray-200 rounded-lg bg-gray-100 text-gray-600 text-right cursor-not-allowed" value="1,284.00" readonly>
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">¥</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 第三组：检测配置 -->
                <div class="bg-gray-50/50 rounded-lg p-4 border border-gray-100">
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <i class="fas fa-flask text-gray-400"></i>
                        检测配置
                    </div>
                    <div class="grid grid-cols-7 gap-4">
                        <div>
                            <label class="form-label required">附加费</label>
                            <div class="relative">
                                <input type="number" class="form-input w-full h-[38px] pl-7 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-right" value="0.00" step="0.01">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">¥</span>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">数量</label>
                            <div class="relative">
                                <input type="number" class="form-input w-full h-[38px] pl-3 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-center" value="1" min="1">
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">器具单位</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>套</option>
                                    <option>件</option>
                                    <option>台</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">服务类型</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>检定</option>
                                    <option>校准</option>
                                    <option>检测</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">是否强检</label>
                            <div class="h-[38px] flex items-center">
                                <label class="inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="w-4 h-4 border-gray-300 rounded text-blue-600 focus:ring-blue-500 focus:ring-offset-0">
                                    <span class="ml-2 text-sm text-gray-600">是</span>
                                </label>
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="form-label">检测方式</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>现场</option>
                                    <option>送检</option>
                                    <option>邮寄</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 第四组：归属信息 -->
                <div class="bg-gray-50/50 rounded-lg p-4 border border-gray-100">
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <i class="fas fa-building text-gray-400"></i>
                        归属信息
                    </div>
                    <div class="grid grid-cols-5 gap-4">
                        <div>
                            <label class="form-label required">检测部门</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>压力检测部</option>
                                    <option>电学检测部</option>
                                    <option>长度检测部</option>
                                    <option>热工检测部</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label required">检测岗位</label>
                            <div class="relative">
                                <select class="form-input w-full h-[38px] pl-3 pr-8 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none appearance-none bg-white">
                                    <option selected>现场</option>
                                    <option>实验室</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label">类型</label>
                            <input type="text" class="form-input w-full h-[38px] px-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none" placeholder="请输入类型">
                        </div>
                        <div>
                            <label class="form-label">规格型号</label>
                            <div class="relative">
                                <input type="text" class="form-input w-full h-[38px] pl-9 pr-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none" value="Rosemount">
                                <i class="fas fa-barcode absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                            </div>
                        </div>
                        <div>
                            <label class="form-label">备注信息</label>
                            <input type="text" class="form-input w-full h-[38px] px-3 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none" placeholder="请输入备注">
                        </div>
                    </div>
                </div>

            </form>
        </div>

        <!-- 底部按钮 -->
        <div class="h-16 border-t border-gray-200 px-6 flex items-center justify-between bg-gray-50 shrink-0">
            <div class="text-xs text-gray-500">
                <i class="fas fa-info-circle mr-1"></i>
                带 <span class="text-red-500 font-bold">*</span> 的为必填项
            </div>
            <div class="flex gap-3">
                <button class="px-5 h-9 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 hover:border-gray-400 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200">
                    取消
                </button>
                <button class="px-5 h-9 border border-transparent rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-sm shadow-blue-200 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex items-center gap-2">
                    <i class="fas fa-save text-xs"></i>
                    保存
                </button>
            </div>
        </div>
    </div>

</body>
</html>
